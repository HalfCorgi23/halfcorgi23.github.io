# Strings
# =======================================================================================
# This file contains all soft-coded strings of the theme.
# You can edit them here if you want to change the wording of certain phrases,
# e.g. maybe you prefer "Fetching…" to "Loading…", etc.
#
# You can also use this to "translate" the theme into different langauges,
# but note that this may not work in all situations,
# especially for languages that differ significantly from English.

# Free version
# ---------------------------------------------------------------------------------------
home:                  主页
pages:                 页面
posts:                 文章
about:                 关于
related_posts:         相关文章
other_projects:        其他项目
comments:              评论
jump_to:               跳转到
navigation:            导航
social:                社交
links:                 链接
pagination:            页码
newer:                 后续文章
older:                 以往文章
back:                  返回
templates:             模板

loading:               正在加载……
redirecting:           正在跳转……

continue_reading:      >
  继续阅读 <!--post_title-->

not_found:
  title:               '404: 页面未找到'
  message:             |
    很抱歉，我们没有找到此链接。
    请返回<!--home_link-->重试！
  home_link:           主页面

error:
  title:               错误
  message:             |
    很抱歉，我们加载链接<!--link-->时出现错误。

# Separators
# ---------------------------------------------------------------------------------------
colon:                 ':'
separator:             '|'
category_start:        'in '
category_spearator:    ' / '
tag_start:             'on '
tag_separator:         ', '

# Date formats
# ---------------------------------------------------------------------------------------
date_formats:
  post:                '%d %b %Y'
  related_post:        '%d %b %Y'
  list_group_by:       '%Y'
  list_entry:          '%d %b'
  project:             '%Y'
  projects_group_by:   '%Y'
  resume:              '%b %Y'


